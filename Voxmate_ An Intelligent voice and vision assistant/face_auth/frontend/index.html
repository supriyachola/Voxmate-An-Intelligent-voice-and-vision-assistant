<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Face Authentication</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Face Recognition Login System</h1>

  <video id="video" autoplay playsinline></video>

  <div>
    <input id="userId" type="text" placeholder="Enter User ID" />
  </div>

  <div>
    <button id="signupBtn">Sign Up (Capture 4 photos)</button>
    <button id="loginBtn">Login (Capture 1 photo)</button>
  </div>

  <div id="status"></div>

  <script src="script.js"></script>
</body>
</html>
